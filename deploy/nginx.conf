server {
    listen 80;
    server_name 121.41.74.45;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # 全局禁用缓存（开发阶段确保每次拉最新）
    add_header Cache-Control "no-cache, must-revalidate";

    # ===== 项目展示页 (showcase) =====
    root /opt/weplan/frontend/showcase;

    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ===== Demo 页面 =====
    # /demo → 301 到 /demo/
    location = /demo {
        return 301 /demo/;
    }

    location /demo/ {
        alias /opt/weplan/frontend/demo/;
        index index.html;
    }

    # ===== 投票页面 =====
    location = /vote {
        return 301 /vote/;
    }

    location /vote/ {
        alias /opt/weplan/frontend/vote/;
        index index.html;
    }

    # ===== API 后端代理 =====
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # ===== 静态文件（前端直通后端） =====
    location /static/ {
        proxy_pass http://127.0.0.1:8000/static/;
    }

    # ===== PDF 报告 =====
    location = /weplan_report.pdf {
        alias /opt/weplan/docs/weplan_report.pdf;
        add_header Content-Disposition "inline; filename=WePlan_Report.pdf";
    }

    location = /design_doc.pdf {
        alias /opt/weplan/docs/design_2page.pdf;
        add_header Content-Disposition "inline; filename=WePlan_Design.pdf";
    }

    # ===== 产品介绍视频页面 =====
    location = /video {
        return 301 /video/;
    }

    location /video/ {
        alias /opt/weplan/docs/;
        index video.html;
        types {
            text/html html;
            audio/mpeg mp3;
        }
    }
}
