server {
    listen 80;
    server_name 121.41.74.45;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # 项目展示页 (showcase)
    location / {
        root /opt/weplan/frontend/showcase;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.(css|js|png|jpg|gif|ico|svg)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Demo 页面
    location ^~ /demo {
        alias /opt/weplan/frontend/demo;
        index index.html;

        # 精确匹配 /demo 或 /demo/ 时返回 index.html
        location = /demo {
            alias /opt/weplan/frontend/demo;
            index index.html;
            try_files /index.html =404;
        }

        location = /demo/ {
            alias /opt/weplan/frontend/demo/;
            index index.html;
            try_files /index.html =404;
        }

        # 匹配 /demo/ 下的静态资源
        location ~* ^/demo/(.+\.(css|js|png|jpg|gif|ico|svg))$ {
            alias /opt/weplan/frontend/demo/$1;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 投票页面
    location ^~ /vote {
        alias /opt/weplan/frontend/vote;
        index index.html;

        location = /vote {
            alias /opt/weplan/frontend/vote;
            index index.html;
            try_files /index.html =404;
        }

        location = /vote/ {
            alias /opt/weplan/frontend/vote/;
            index index.html;
            try_files /index.html =404;
        }

        location ~* ^/vote/(.+\.(css|js|png|jpg|gif|ico|svg))$ {
            alias /opt/weplan/frontend/vote/$1;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # API 后端代理
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # PDF 报告
    location = /weplan_report.pdf {
        alias /opt/weplan/docs/weplan_report.pdf;
        add_header Content-Disposition "inline; filename=WePlan_Report.pdf";
    }

    # 2页设计文档
    location = /design_doc.pdf {
        alias /opt/weplan/docs/design_2page.pdf;
        add_header Content-Disposition "inline; filename=WePlan_Design.pdf";
    }
}
