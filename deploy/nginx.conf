server {
    listen 80;
    server_name 121.41.74.45;

    # 项目展示页
    location / {
        root /opt/weplan/frontend/showcase;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Demo页面
    location /demo {
        alias /opt/weplan/frontend/demo;
        index index.html;
        try_files $uri $uri/ /demo/index.html;
    }

    # 投票页面
    location /vote {
        alias /opt/weplan/frontend/vote;
        index index.html;
        try_files $uri $uri/ /vote/index.html;
    }

    # API后端
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_buffering off;  # SSE需要
    }

    # PDF报告
    location /weplan_report.pdf {
        alias /opt/weplan/docs/weplan_report.pdf;
    }

    # 2页设计文档
    location /design_doc.pdf {
        alias /opt/weplan/docs/design_2page.pdf;
    }

    # 静态资源缓存
    location ~* \.(css|js|png|jpg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
