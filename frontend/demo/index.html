<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WePlan · AI 周末生活规划师</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗓</text></svg>">
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="navbar">
    <div class="nav-left">
      <div class="logo">
        <span class="logo-icon">🗓</span>
        <span class="logo-text">WePlan</span>
      </div>
      <div class="city-selector" id="citySelector">
        <span class="city-name">杭州</span>
        <svg class="chevron-down" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        <div class="city-dropdown" id="cityDropdown">
          <div class="city-option active" data-city="杭州">杭州</div>
          <div class="city-option" data-city="北京">北京</div>
          <div class="city-option" data-city="上海">上海</div>
          <div class="city-option" data-city="深圳">深圳</div>
          <div class="city-option" data-city="成都">成都</div>
        </div>
      </div>
    </div>
    <div class="nav-center">
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="family">
          <span class="mode-icon">👨‍👩‍👧</span>
          <span class="mode-label">家庭</span>
        </button>
        <button class="mode-tab" data-mode="friends">
          <span class="mode-icon">👫</span>
          <span class="mode-label">朋友</span>
        </button>
        <button class="mode-tab" data-mode="couple">
          <span class="mode-icon">💑</span>
          <span class="mode-label">情侣</span>
        </button>
        <button class="mode-tab" data-mode="solo">
          <span class="mode-icon">🧘</span>
          <span class="mode-label">独处</span>
        </button>
      </div>
    </div>
    <div class="nav-right">
      <button class="nav-btn thinking-toggle" id="thinkingToggle" title="Agent 思维面板">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a9 9 0 0 1 9 9c0 3.9-3.2 7.2-6 9.6-.8.7-1.7 1.4-3 1.4s-2.2-.7-3-1.4C6.2 18.2 3 14.9 3 11a9 9 0 0 1 9-9z"/><path d="M9 22h6"/><path d="M12 2v4"/><path d="M8 10h8"/></svg>
        <span>Agent</span>
      </button>
      <button class="nav-btn theme-toggle" id="themeToggle" title="切换主题">
        <span class="theme-icon-light">☀️</span>
        <span class="theme-icon-dark">🌙</span>
      </button>
      <div class="mode-badge" id="modeBadge">展示模式</div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="main-content">
    <!-- 左侧聊天区 -->
    <aside class="chat-panel" id="chatPanel">
      <div class="chat-header">
        <h2>对话</h2>
        <button class="clear-btn" id="clearChat" title="清空对话">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>

      <!-- 预设场景区 -->
      <div class="preset-scenes" id="presetScenes">
        <div class="preset-title">试试这些场景 ✨</div>
        <div class="preset-buttons">
          <button class="preset-btn" data-case="family-park">
            <span class="preset-emoji">🎪</span>
            <span class="preset-text">家庭温馨游</span>
          </button>
          <button class="preset-btn" data-case="friends-gathering">
            <span class="preset-emoji">🎉</span>
            <span class="preset-text">朋友周末聚会</span>
          </button>
          <button class="preset-btn" data-case="rainy-indoor">
            <span class="preset-emoji">🌧️</span>
            <span class="preset-text">雨天室内计划</span>
          </button>
          <button class="preset-btn" data-case="culture-tour">
            <span class="preset-emoji">🏛️</span>
            <span class="preset-text">文艺探店之旅</span>
          </button>
        </div>
      </div>

      <!-- 消息列表 -->
      <div class="chat-messages" id="chatMessages">
        <div class="message ai-message welcome-message">
          <div class="avatar ai-avatar">🤖</div>
          <div class="message-content">
            <div class="message-bubble">
              你好！我是 WePlan，你的 AI 周末活动规划师 🎯<br><br>
              告诉我你这个周末想怎么过，我会为你量身打造完美方案！你可以点击上方的场景按钮快速体验，或者直接告诉我你的需求。
            </div>
            <div class="message-time">刚刚</div>
          </div>
        </div>
      </div>

      <!-- 输入区 -->
      <div class="chat-input-area">
        <div class="input-wrapper">
          <textarea class="chat-input" id="chatInput" placeholder="描述你的周末计划需求..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" title="发送">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- 右侧方案预览面板 -->
    <section class="canvas-panel" id="canvasPanel">
      <!-- 空状态 -->
      <div class="canvas-empty" id="canvasEmpty">
        <div class="empty-illustration">
          <div class="empty-icon">🗺️</div>
          <h3>方案将在这里呈现</h3>
          <p>从左侧开始对话，或点击预设场景快速体验</p>
        </div>
      </div>

      <!-- 方案内容（初始隐藏） -->
      <div class="canvas-content" id="canvasContent" style="display:none;">
        <!-- Tab 标签 -->
        <div class="plan-tabs" id="planTabs">
          <button class="plan-tab active" data-plan="0">
            <span class="tab-icon">🌟</span> 方案 A
          </button>
          <button class="plan-tab" data-plan="1">
            <span class="tab-icon">💡</span> 方案 B
          </button>
          <button class="plan-tab" data-plan="2">
            <span class="tab-icon">🎯</span> 方案 C
          </button>
        </div>

        <!-- 方案标题区 -->
        <div class="plan-header" id="planHeader">
          <h2 class="plan-title" id="planTitle"></h2>
          <p class="plan-subtitle" id="planSubtitle"></p>
        </div>

        <!-- 雷达图对比区 -->
        <div class="radar-section" id="radarSection">
          <div class="radar-container">
            <canvas id="radarCanvas" width="280" height="280"></canvas>
          </div>
          <div class="radar-legend" id="radarLegend"></div>
        </div>

        <!-- 时间线区域 -->
        <div class="timeline-section" id="timelineSection">
          <h3 class="section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            行程安排
          </h3>
          <div class="timeline" id="timeline"></div>
        </div>

        <!-- 底部统计与操作 -->
        <div class="plan-footer" id="planFooter">
          <div class="plan-stats">
            <div class="stat-item">
              <span class="stat-icon">💰</span>
              <span class="stat-label">预计花费</span>
              <span class="stat-value" id="statCost">--</span>
            </div>
            <div class="stat-item">
              <span class="stat-icon">⏱</span>
              <span class="stat-label">总时长</span>
              <span class="stat-value" id="statDuration">--</span>
            </div>
            <div class="stat-item">
              <span class="stat-icon">📍</span>
              <span class="stat-label">活动数</span>
              <span class="stat-value" id="statCount">--</span>
            </div>
          </div>
          <div class="plan-actions">
            <button class="action-btn primary-btn" id="executeBtn">
              <span class="btn-icon">✅</span> 一键执行
            </button>
            <button class="action-btn secondary-btn" id="shareBtn">
              <span class="btn-icon">📤</span> 分享
            </button>
            <button class="action-btn secondary-btn" id="voteBtn">
              <span class="btn-icon">🗳</span> 投票
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Agent 思维面板 -->
  <div class="thinking-panel" id="thinkingPanel">
    <div class="thinking-toggle-bar" id="thinkingToggleBar">
      <span class="thinking-bar-label">🧠 Agent 协作流水线</span>
      <span class="thinking-bar-status" id="thinkingBarStatus"></span>
      <svg class="thinking-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
    </div>
    <div class="thinking-content" id="thinkingContent">
      <div class="pipeline" id="pipeline"></div>
      <div class="agent-detail" id="agentDetail">
        <div class="detail-placeholder">点击任意 Agent 节点查看详细思维过程</div>
      </div>
    </div>
  </div>

  <!-- 投票弹窗 -->
  <div class="modal-overlay" id="voteModal" style="display:none;">
    <div class="modal-content vote-modal">
      <div class="modal-header">
        <h3>📊 方案投票</h3>
        <button class="modal-close" data-modal="voteModal">&times;</button>
      </div>
      <div class="modal-body" id="voteBody"></div>
      <div class="modal-footer">
        <button class="action-btn primary-btn" id="submitVote">提交投票</button>
      </div>
    </div>
  </div>

  <!-- 分享弹窗 -->
  <div class="modal-overlay" id="shareModal" style="display:none;">
    <div class="modal-content share-modal">
      <div class="modal-header">
        <h3>📤 分享方案</h3>
        <button class="modal-close" data-modal="shareModal">&times;</button>
      </div>
      <div class="modal-body share-body">
        <div class="share-preview" id="sharePreview"></div>
        <div class="share-link-area">
          <input type="text" class="share-link-input" id="shareLinkInput" readonly>
          <button class="copy-btn" id="copyLinkBtn">复制链接</button>
        </div>
        <div class="share-channels">
          <button class="share-channel" data-channel="wechat">
            <span class="channel-icon">💬</span>
            <span>微信</span>
          </button>
          <button class="share-channel" data-channel="weibo">
            <span class="channel-icon">📱</span>
            <span>微博</span>
          </button>
          <button class="share-channel" data-channel="link">
            <span class="channel-icon">🔗</span>
            <span>复制链接</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 执行进度弹窗 -->
  <div class="modal-overlay" id="executeModal" style="display:none;">
    <div class="modal-content execute-modal">
      <div class="modal-header">
        <h3>⚡ 一键执行</h3>
        <button class="modal-close" data-modal="executeModal">&times;</button>
      </div>
      <div class="modal-body" id="executeBody"></div>
    </div>
  </div>

  <!-- 移动端底部标签栏 -->
  <div class="mobile-tabs" id="mobileTabs">
    <button class="mobile-tab active" data-panel="chat">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>对话</span>
    </button>
    <button class="mobile-tab" data-panel="canvas">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      <span>方案</span>
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
