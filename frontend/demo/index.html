<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WePlan · AI 周末生活规划师</title>
  <link rel="stylesheet" href="style.css?v=20260517d">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗓</text></svg>">
  <script>window._AMapSecurityConfig = { securityJsCode: "d57dafc6b387f85f5ef1240ec33664fd" };</script>
</head>
<body>

  <!-- ====== Top Navbar ====== -->
  <nav class="navbar" id="navbar">
    <div class="navbar-left">
      <span class="brand-logo">🗓 WePlan</span>
      <span class="city-badge" id="locationDisplay">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span id="cityLabel">定位中...</span>
      </span>
    </div>
    <div class="navbar-right">
      <label class="toggle-switch" id="agentThinkingToggle" title="显示 Agent 思维过程">
        <input type="checkbox" id="agentThinkingCheck" checked>
        <span class="toggle-slider"></span>
        <span class="toggle-label">Agent 思维</span>
      </label>
      <button class="icon-btn" id="historyBtn" title="历史记录">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>
      <button class="icon-btn" id="themeToggle" title="切换主题">
        <span class="theme-icon-light">☀️</span>
        <span class="theme-icon-dark">🌙</span>
      </button>
    </div>
  </nav>

  <!-- ====== Main Content: Dual Column ====== -->
  <main class="main-container" id="mainContainer">

    <!-- ── Left: Chat Panel (40%) ── -->
    <section class="chat-panel" id="chatPanel">

      <div class="chat-body" id="chatBody">
        <!-- Welcome -->
        <div class="welcome-block" id="welcomeBlock">
          <div class="welcome-avatar">🗓</div>
          <h2 class="welcome-title">你好，我是 WePlan</h2>
          <p class="welcome-subtitle">你的 AI 周末生活规划师。告诉我你的周末想怎么过，我来帮你安排！</p>

          <div class="preset-prompts" id="presetPrompts">
            <button class="prompt-bubble" data-prompt="今天下午带娃出去玩，孩子5岁，老婆在减肥">🎪 今天下午带娃出去玩，孩子5岁，老婆在减肥</button>
            <button class="prompt-bubble" data-prompt="周六4个朋友聚一聚，吃喝玩乐来点新奇的">🎉 周六4个朋友聚一聚，吃喝玩乐来点新奇的</button>
            <button class="prompt-bubble" data-prompt="和女朋友约会，找个浪漫有氛围的地方">💑 和女朋友约会，找个浪漫有氛围的地方</button>
            <button class="prompt-bubble" data-prompt="一个人想找个安静地方待一会儿">🧘 一个人想找个安静地方待一会儿</button>
            <button class="prompt-bubble" data-prompt="下雨了，找个室内活动">🌧️ 下雨了，找个室内活动</button>
            <button class="prompt-bubble" data-prompt="在北京，想来个文化探索日">🏛️ 在北京，想来个文化探索日</button>
          </div>
        </div>

        <!-- Message list -->
        <div class="message-list" id="messageList"></div>
      </div>

      <!-- Input bar -->
      <div class="input-bar" id="inputBar">
        <div class="input-wrapper">
          <input type="text" class="chat-input" id="chatInput" placeholder="说说你想怎么过周末..." autocomplete="off">
          <button class="mic-btn" id="micBtn" title="语音输入">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <button class="send-btn" id="sendBtn" title="发送">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>

      <!-- Voice recording indicator -->
      <div class="voice-indicator" id="voiceIndicator" style="display:none">
        <div class="voice-waves"><span></span><span></span><span></span><span></span><span></span></div>
        <div class="voice-text">松开发送，上滑取消</div>
      </div>
    </section>

    <!-- ── Right: Plan Canvas Panel (60%) ── -->
    <section class="plan-panel" id="planPanel">

      <!-- Empty state -->
      <div class="plan-empty" id="planEmpty">
        <div class="empty-icon">📋</div>
        <h3 class="empty-title">方案画布</h3>
        <p class="empty-subtitle">在左侧对话中描述你的需求，AI 将在这里生成周末方案</p>
      </div>

      <!-- Plan content (initially hidden) -->
      <div class="plan-content" id="planContent" style="display:none">

        <!-- Plan A / B / C tabs -->
        <div class="plan-tabs" id="planTabs"></div>

        <!-- Map section -->
        <div class="plan-map-section">
          <div class="section-label">📍 路线地图</div>
          <div class="map-wrapper" id="mapContainer"></div>
        </div>

        <!-- Radar chart -->
        <div class="plan-radar-section">
          <div class="section-label">📊 方案画像</div>
          <div class="radar-wrapper">
            <canvas id="radarCanvas" width="280" height="280"></canvas>
          </div>
        </div>

        <!-- Timeline -->
        <div class="plan-timeline-section">
          <div class="section-label">🕐 时间线</div>
          <div class="timeline-list" id="planTimeline"></div>
        </div>

        <!-- Stats -->
        <div class="plan-stats" id="planStats"></div>

        <!-- Action buttons -->
        <div class="plan-actions" id="planActions">
          <button class="action-btn primary" id="executeBtn">✅ 确认执行</button>
          <button class="action-btn" id="shareBtn">📤 分享方案</button>
          <button class="action-btn" id="cheaperBtn">💰 换个更省的</button>
          <button class="action-btn" id="premiumBtn">✨ 换个更好的</button>
        </div>
      </div>
    </section>
  </main>

  <!-- ====== Bottom: Agent Thinking Panel (collapsible) ====== -->
  <div class="thinking-panel" id="thinkingPanel" style="display:none">
    <div class="thinking-header" id="thinkingHeader">
      <span class="thinking-title">🧠 Agent 思维过程</span>
      <button class="thinking-collapse-btn" id="thinkingCollapseBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
    <div class="thinking-body" id="thinkingBody">
      <div class="thinking-pipeline" id="thinkingPipeline"></div>
      <div class="thinking-detail" id="thinkingDetail"></div>
    </div>
  </div>

  <!-- ====== Mobile Bottom Tab Bar (hidden on desktop) ====== -->
  <div class="mobile-tabbar" id="mobileTabbar">
    <button class="tab-item active" data-tab="chat" id="tabChat">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>对话</span>
    </button>
    <button class="tab-item" data-tab="plan" id="tabPlan">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      <span>方案</span>
    </button>
  </div>

  <!-- ====== Modals ====== -->

  <!-- Share modal -->
  <div class="modal-overlay" id="shareModal" style="display:none">
    <div class="modal-content">
      <div class="modal-header">
        <h3>📤 分享方案</h3>
        <button class="modal-close" id="shareModalClose">&times;</button>
      </div>
      <div class="modal-body" id="shareBody"></div>
    </div>
  </div>

  <!-- Execute progress modal -->
  <div class="modal-overlay" id="executeModal" style="display:none">
    <div class="modal-content">
      <div class="modal-header">
        <h3>⚡ 执行中</h3>
        <button class="modal-close" id="execModalClose">&times;</button>
      </div>
      <div class="modal-body" id="executeBody"></div>
    </div>
  </div>

  <!-- History drawer -->
  <div class="history-drawer" id="historyDrawer" style="display:none">
    <div class="drawer-header">
      <h3>📋 历史记录</h3>
      <button class="modal-close" id="historyClose">&times;</button>
    </div>
    <div class="drawer-body" id="historyList"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="https://webapi.amap.com/maps?v=2.0&key=e2b1bc957debb654563f44988a93440f&plugin=AMap.Scale,AMap.Driving,AMap.Transfer,AMap.Walking,AMap.Geocoder"></script>
  <script src="app.js?v=20260517d"></script>
</body>
</html>
